name: Automated donator builds

on:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make scripts executable
        run: |
          chmod +x ./gradlew
          chmod +x ./scripts/merge_jar.sh

      - name: Apply Spotless formatting
        run: ./gradlew spotlessApply --no-daemon

      - name: Build mod
        run: ./gradlew build --no-daemon

      - name: Run PackSquash
        uses: ComunidadAylas/PackSquash-action@v4
        with:
          packsquash_version: latest
          options: |
            pack_directory = './build/resources/main/'
            output_file_path = '/tmp/pack.zip'

      - name: Merge optimized resources into jar
        run: ./scripts/merge_jar.sh ./build/reobfJarJar /tmp/pack.zip

      - name: Prepare artifact
        run: |
          mkdir -p build/discord-artifacts

          jar="$(find build/reobfJarJar -maxdepth 1 -type f -name '*-shadowed.jar' | head -n 1)"

          if [ -z "$jar" ]; then
            echo "No reobfuscated shadowed jar found in build/reobfJarJar"
            find build -type f -name '*.jar'
            exit 1
          fi

          filename="$(basename "$jar" .jar)-B${{ github.run_number }}-${{ github.ref_name }}.jar"
          cp "$jar" "build/discord-artifacts/$filename"

          echo "Prepared artifact:"
          ls -lh build/discord-artifacts

      - name: Upload artifact to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: Through-Time-and-Space-B${{ github.run_number }}-${{ github.ref_name }}
          path: build/discord-artifacts/*.jar
          if-no-files-found: error

      - name: Publish artifact to Discord
        uses: DrTheodor/discord-webhook-upload-action@v0.3
        with:
          url: ${{ secrets.DEV_BUILDS }}
          file: "build/discord-artifacts/*.jar"
          username: TheMaster
          avatar: "https://media.forgecdn.net/avatars/thumbnails/983/766/256/256/638492366759883163.png"
          message_commit: "> :sparkles: [${commitMessage}](<${commitUrl}>) by [${authorName}](<${authorUrl}>)"
          message_header: |
            <:new1:1253371736510959636><:new2:1253371805734015006> New `Through Time and Space` dev build `#${{ github.run_number }}`:
